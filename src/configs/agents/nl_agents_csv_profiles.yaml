
# Generator parameters
dispatchableGenerators:
 Base:
  bidPrice: 60 # EUR/MWh
  capacity: 3309 # MW
  rampRate: 2 # % of nominal power per minute
  initialQuantity: 3309
  emissionFactor: 980 # kgCO2e/MWh

 Shoulder:
  bidPrice: 90 # EUR/MWh
  capacity: 9523 # MW
  rampRate: 6 # % of nominal power per minute
  initialQuantity: 0
  emissionFactor: 420 # kgCO2e/MWh

 Peak:
  bidPrice: 120 # EUR/MWh
  capacity: 3738 # MW
  rampRate: 12 # % of nominal power per minute
  initialQuantity: 0
  emissionFactor: 420 # kgCO2e/MWh

variableGenerators:
  Wind:
    bidPrice: 0         # EUR/MWh
    capacity: 11036        # MW
    profile_file: ../DATA/inputs/wind-2026-uur-data.csv
    profile_type: availability
  Solar:
    bidPrice: 0         # EUR/MWh
    capacity: 24700        # MW
    profile_file: ../DATA/inputs/zon-2026-uur-data.csv
    profile_type: availability 

# Storage parameters
batteryStorage:
  energyCapacity: 2000 # MWh
  powerCapacity: 1000 # MW
  efficiency: 0.9
  initialSOC: 0.5 # as fraction of energyCapacity
  endSOC: 0.5 # as fraction of energyCapacity
  
# Demand parameters
demand:
  segments:
    Base_D:
      bidPrice: 300   # EUR/MWh (high willingness to pay)
      profile_file: ../DATA/inputs/electriciteitsmix-2026-uur-data.csv
      profile_type: quantity
    Flex:
      bidPrice: 70   # EUR/MWh (elastic, only if price low)
      quantity_constant: 200